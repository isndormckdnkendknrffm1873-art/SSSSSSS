name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # هذا السطر يجبر السيرفر على الدخول لمجلد مشروعك وإعداد البيئة من داخله
      - name: Pre-configure Android
        run: |
          cd SSSSSSS
          mkdir -p android
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Install dependencies
        run: |
          cd SSSSSSS
          flutter pub get

      - name: Build APK
        run: |
          cd SSSSSSS
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: SSSSSSS/build/app/outputs/flutter-apk/app-release.apk
